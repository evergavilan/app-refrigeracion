<!-- ===================================================== -->
<!-- SERVICE WORKER — registrado desde la raíz             -->
<!-- Debe estar aquí (no en core/) para que el scope sea / -->
<!-- ===================================================== -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker
        .register("service-worker.js")
        .then(function (reg) {
          console.log("✅ SW registrado, scope:", reg.scope);
          // Notificar cuando hay nueva versión
          navigator.serviceWorker.addEventListener("controllerchange", function () {
            var btn = document.createElement("button");
            btn.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:24px;background:#ff9b42;color:#fff;font-weight:800;border:none;cursor:pointer;font-size:14px;";
            btn.textContent = "🔄 Nueva versión — tocá para actualizar";
            btn.onclick = function () { window.location.reload(); };
            document.body.appendChild(btn);
          });
        })
        .catch(function (err) {
          console.warn("SW no disponible:", err.message || err);
        });
    });
  }
</script>
